<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Owner Console | 25 Plus Snacks</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --accent:#d35400; --dark:#1e272e; --success:#27ae60; --warn:#f39c12; --info:#2980b9; --danger:#e74c3c; --border:#eee; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Plus Jakarta Sans',sans-serif; background:#f1f2f6; color:var(--dark); }

    /* PIN */
    #pin-screen { position:fixed; inset:0; background:var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    #pin-screen h1 { color:white; font-size:1.5rem; margin-bottom:6px; }
    #pin-screen p  { color:rgba(255,255,255,0.5); font-size:0.85rem; margin-bottom:24px; }
    #pin-input { background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); color:white; padding:14px 20px; border-radius:12px; font-size:1.5rem; letter-spacing:8px; text-align:center; width:200px; outline:none; font-family:inherit; }
    #pin-input:focus { border-color:var(--accent); }
    #pin-error { color:#e74c3c; font-size:0.8rem; margin-top:8px; height:16px; }
    .pin-btn { background:var(--accent); color:white; border:none; padding:14px 32px; border-radius:12px; font-weight:800; font-size:1rem; cursor:pointer; margin-top:12px; font-family:inherit; width:200px; }

    /* HEADER */
    header { background:var(--dark); padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:52px; position:sticky; top:0; z-index:100; }
    .logo { color:white; font-weight:800; font-size:0.95rem; }
    .logo span { color:var(--accent); }
    .hdr-right { display:flex; align-items:center; gap:12px; }
    .live-dot { width:8px; height:8px; background:#27ae60; border-radius:50%; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .logout-btn { color:rgba(255,255,255,0.5); font-size:0.78rem; cursor:pointer; border:none; background:none; font-family:inherit; }

    /* TABS */
    .tab-bar { background:white; border-bottom:2px solid var(--border); display:flex; overflow-x:auto; padding:0 12px; position:sticky; top:52px; z-index:99; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab { padding:12px 14px; font-weight:700; font-size:0.78rem; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; color:#999; transition:0.2s; display:flex; align-items:center; gap:5px; }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-count { background:#eee; color:#666; border-radius:20px; padding:1px 6px; font-size:0.68rem; font-weight:800; }
    .tab.active .tab-count { background:var(--accent); color:white; }

    /* MAIN */
    main { max-width:1100px; margin:0 auto; padding:16px 14px 60px; }

    /* STATS */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; margin-bottom:16px; }
    .stat-card { background:white; border-radius:14px; padding:14px; border-left:4px solid; }
    .stat-card .num { font-size:1.6rem; font-weight:900; }
    .stat-card .lbl { font-size:0.7rem; color:#888; font-weight:600; margin-top:2px; }
    .s-p{ border-color:var(--warn); }   .s-p .num{ color:var(--warn); }
    .s-c{ border-color:var(--info); }   .s-c .num{ color:var(--info); }
    .s-o{ border-color:#8e44ad; }       .s-o .num{ color:#8e44ad; }
    .s-f{ border-color:#16a085; }       .s-f .num{ color:#16a085; }
    .s-d{ border-color:var(--success); }.s-d .num{ color:var(--success); }

    /* SECTIONS */
    .section { display:none; }
    .section.active { display:block; }
    .sec-title { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; color:#bbb; margin:16px 0 8px; }

    /* KITCHEN STRIP */
    .kitchen-strip { background:white; border-radius:14px; padding:14px 16px; margin-bottom:16px; border:1px solid var(--border); }
    .ks-header { font-size:0.72rem; font-weight:800; text-transform:uppercase; color:#aaa; margin-bottom:10px; display:flex; justify-content:space-between; }
    .ks-slots { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; }
    .ks-slots::-webkit-scrollbar { display:none; }
    .kslot { background:#f9f9f9; border-radius:10px; padding:10px 14px; min-width:160px; border:1px solid var(--border); flex-shrink:0; }
    .kslot.urgent { background:#fff8f0; border-color:var(--warn); }
    .kslot-time { font-size:0.9rem; font-weight:900; color:var(--accent); margin-bottom:6px; }
    .kslot.urgent .kslot-time { color:var(--warn); }
    .kslot-item { font-size:0.78rem; color:var(--dark); padding:2px 0; display:flex; justify-content:space-between; gap:8px; }
    .kslot-item span { font-weight:800; color:var(--accent); }

    /* ORDER CARD */
    .order-card { background:white; border-radius:14px; padding:18px; margin-bottom:10px; border:1px solid var(--border); }
    .oc-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
    .oc-ref { font-size:1rem; font-weight:900; letter-spacing:1px; }
    .oc-meta { font-size:0.75rem; color:#aaa; margin-top:2px; }
    .badges { display:flex; gap:5px; flex-wrap:wrap; }
    .badge { font-size:0.68rem; font-weight:800; padding:3px 9px; border-radius:20px; }
    .b-pending          { background:#fff8e8; color:#b7770d; }
    .b-confirmed        { background:#e8f4fd; color:#1a6fa3; }
    .b-preparing        { background:#fff0e8; color:#c0392b; }
    .b-out_for_delivery { background:#f0e8ff; color:#6c3483; }
    .b-delivered        { background:#eafaf1; color:#1e7e34; }
    .b-cancelled        { background:#fde8e8; color:#922b21; }
    .b-delivery         { background:#e8f4fd; color:#1a6fa3; }
    .b-pickup           { background:#eafaf1; color:#1e7e34; }
    .oc-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px 14px; font-size:0.8rem; margin-bottom:10px; }
    .oc-grid .l { color:#aaa; }
    .oc-grid .v { font-weight:600; }
    .items-box { background:#f9f9f9; border-radius:8px; padding:8px 12px; margin-bottom:10px; font-size:0.8rem; }
    .items-box .il { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #eee; }
    .items-box .il:last-child { border:none; }
    .st-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .st-btn { border:none; padding:8px 14px; border-radius:8px; font-weight:700; font-size:0.76rem; cursor:pointer; font-family:inherit; transition:0.2s; }
    .st-btn:hover { transform:translateY(-1px); opacity:.9; }
    .st-btn:disabled { opacity:.5; pointer-events:none; }
    .btn-confirmed        { background:#e8f4fd; color:#1a6fa3; }
    .btn-preparing        { background:#fff0e8; color:var(--accent); }
    .btn-out_for_delivery { background:#f0e8ff; color:#6c3483; }
    .btn-delivered        { background:#eafaf1; color:var(--success); }
    .btn-cancelled        { background:#fde8e8; color:var(--danger); }

    /* SCHEDULE */
    .sched-day { margin-bottom:24px; }
    .sched-day-title { font-weight:800; font-size:0.95rem; margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid var(--border); }
    .time-block { background:white; border-radius:12px; margin-bottom:8px; overflow:hidden; border:1px solid var(--border); }
    .tb-head { padding:10px 14px; background:#f9f9f9; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .tb-head.urgent { background:#fff8f0; }
    .tb-time { font-size:0.95rem; font-weight:900; color:var(--accent); min-width:65px; }
    .tb-head.urgent .tb-time { color:var(--warn); }
    .tb-desc { font-size:0.76rem; color:#888; font-weight:600; }
    .tb-body { padding:10px 14px; }
    .ing-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid #f5f5f5; font-size:0.82rem; }
    .ing-row:last-child { border:none; }
    .ing-name { font-weight:700; }
    .ing-qty { font-weight:900; color:var(--accent); font-size:0.9rem; }
    .ing-for { font-size:0.7rem; color:#bbb; }

    /* INVENTORY — fixed UI */
    .inv-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }
    .inv-card { background:white; border-radius:14px; padding:16px; border:1px solid var(--border); }
    .inv-card.out { border-color:#fecaca; background:#fffafa; }
    .inv-card-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .inv-name { font-weight:800; font-size:0.9rem; }
    .inv-variant { font-size:0.75rem; color:#aaa; margin-top:2px; }
    .inv-status-badge { font-size:0.7rem; font-weight:800; padding:3px 10px; border-radius:20px; }
    .inv-status-badge.in  { background:#eafaf1; color:var(--success); }
    .inv-status-badge.out { background:#fde8e8; color:var(--danger); }

    /* Stock row */
    .inv-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:0.82rem; }
    .inv-row label { color:#888; width:110px; flex-shrink:0; font-weight:600; }
    .inv-row .current-qty { font-weight:900; color:var(--dark); font-size:0.95rem; min-width:50px; }
    .inv-row .unit-lbl { color:#aaa; font-size:0.78rem; }

    /* Add stock row */
    .add-stock-row { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
    .add-stock-row input { flex:1; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.85rem; font-weight:700; text-align:center; outline:none; min-width:0; }
    .add-stock-row input:focus { border-color:var(--accent); }
    .btn-add-stock { background:var(--accent); color:white; border:none; padding:8px 14px; border-radius:8px; font-weight:800; font-size:0.8rem; cursor:pointer; font-family:inherit; white-space:nowrap; }
    .btn-add-stock:hover { background:#b94600; }

    /* Capacity row */
    .cap-row { display:flex; align-items:center; gap:6px; background:#f9f9f9; border-radius:8px; padding:8px 10px; font-size:0.8rem; }
    .cap-row label { color:#888; font-weight:600; flex:1; }
    .cap-row input { width:70px; padding:5px 8px; border:1.5px solid var(--border); border-radius:6px; font-family:inherit; font-size:0.82rem; font-weight:700; text-align:center; outline:none; }
    .cap-row input:focus { border-color:var(--info); }
    .btn-save-cap { background:var(--info); color:white; border:none; padding:5px 12px; border-radius:6px; font-weight:800; font-size:0.76rem; cursor:pointer; font-family:inherit; }

    /* COUNTDOWN */
    .cd { font-size:0.7rem; font-weight:800; padding:2px 7px; border-radius:10px; margin-left:6px; }
    .cd-ok { background:#eafaf1; color:var(--success); }
    .cd-urgent { background:#fff0e8; color:var(--accent); }
    .cd-late { background:#fde8e8; color:var(--danger); }

    /* EMPTY / REFRESH */
    .empty { text-align:center; padding:40px; color:#ccc; }
    .empty i { font-size:2rem; margin-bottom:10px; display:block; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .refresh-btn { background:white; border:1px solid var(--border); color:var(--dark); padding:7px 14px; border-radius:8px; font-weight:700; font-size:0.76rem; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:5px; }
    .upd-time { font-size:0.72rem; color:#bbb; margin-bottom:12px; }

    @media(max-width:600px) { .oc-grid { grid-template-columns:1fr; } .stats-row { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <h1>🔐 Owner Console</h1>
  <p>25 Plus Snacks — Admin Access</p>
  <input type="password" id="pin-input" placeholder="••••" maxlength="6" inputmode="numeric" onkeydown="if(event.key==='Enter')checkPin()">
  <div id="pin-error"></div>
  <button class="pin-btn" onclick="checkPin()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <header>
    <div class="logo"><span>25</span> Plus Snacks Console</div>
    <div class="hdr-right">
      <div class="live-dot"></div>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </header>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('today')"     id="tab-today">     <i class="fas fa-calendar-day"></i> Today        <span class="tab-count" id="cnt-today">0</span></div>
    <div class="tab"        onclick="switchTab('pending')"   id="tab-pending">   <i class="fas fa-clock"></i> Pending          <span class="tab-count" id="cnt-pending">0</span></div>
    <div class="tab"        onclick="switchTab('confirmed')" id="tab-confirmed"> <i class="fas fa-check-circle"></i> Confirmed   <span class="tab-count" id="cnt-confirmed">0</span></div>
    <div class="tab"        onclick="switchTab('kitchen')"   id="tab-kitchen">   <i class="fas fa-utensils"></i> Kitchen</div>
    <div class="tab"        onclick="switchTab('packaging')" id="tab-packaging"> <i class="fas fa-box"></i> Packaging</div>
    <div class="tab"        onclick="switchTab('ofd')"       id="tab-ofd">       <i class="fas fa-truck"></i> Out for Delivery <span class="tab-count" id="cnt-ofd">0</span></div>
    <div class="tab"        onclick="switchTab('future')"    id="tab-future">    <i class="fas fa-calendar-alt"></i> Future       <span class="tab-count" id="cnt-future">0</span></div>
    <div class="tab"        onclick="switchTab('completed')" id="tab-completed"> <i class="fas fa-check-double"></i> Completed   <span class="tab-count" id="cnt-done">0</span></div>
    <div class="tab"        onclick="switchTab('inventory')" id="tab-inventory"> <i class="fas fa-boxes"></i> Inventory</div>
  </div>

  <main>
    <div class="top-bar">
      <div class="stats-row" id="stats-row" style="flex:1;margin-bottom:0;"></div>
      <button class="refresh-btn" onclick="loadAll()" style="margin-left:10px;"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
    <div class="upd-time" id="upd-time"></div>

    <div class="section active" id="section-today"></div>
    <div class="section"        id="section-pending"></div>
    <div class="section"        id="section-confirmed"></div>
    <div class="section"        id="section-kitchen"></div>
    <div class="section"        id="section-packaging"></div>
    <div class="section"        id="section-ofd"></div>
    <div class="section"        id="section-future"></div>
    <div class="section"        id="section-completed"></div>
    <div class="section"        id="section-inventory"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const PIN       = '2526';
  const SUPA_URL  = 'https://qkemufgipqtqqsmzzjlb.supabase.co';
  const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrZW11ZmdpcHF0cXFzbXp6amxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDkzNjYsImV4cCI6MjA4OTk4NTM2Nn0.fNclTYljlN2qze9_wMuzDPh68l0Ve15OkNY7Zl6aFPs';
  const EDGE_URL  = `${SUPA_URL}/functions/v1/send-order-email`;
  const MENU_URL  = 'https://raw.githubusercontent.com/25plussnacks/25Plus-assets/main/menu.json';
  const PACK_MINS = 20;
  const VALID_ST  = ['pending','confirmed','preparing','out_for_delivery','delivered','cancelled'];

  const sb = supabase.createClient(SUPA_URL, SUPA_ANON);
  let allOrders=[], inventory=[], bookings=[], menuItems=[], activeTab='today';

  /* ── PIN ── */
  function checkPin() {
    if (document.getElementById('pin-input').value.trim() === PIN) {
      sessionStorage.setItem('ca','1');
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('app').style.display='block';
      loadAll(); setInterval(loadAll, 60000);
    } else { document.getElementById('pin-error').innerText='Wrong PIN.'; document.getElementById('pin-input').value=''; }
  }
  function logout() { sessionStorage.removeItem('ca'); location.reload(); }
  if (sessionStorage.getItem('ca')==='1') {
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('app').style.display='block';
    loadAll(); setInterval(loadAll, 60000);
  }

  function switchTab(t) {
    activeTab=t;
    document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
    document.getElementById(`tab-${t}`).classList.add('active');
    document.getElementById(`section-${t}`).classList.add('active');
  }

  /* ── Load ── */
  async function loadAll() {
    const now=new Date();
    const start=new Date(now); start.setDate(start.getDate()-1); start.setHours(0,0,0,0);

    const todayStr = new Date().toISOString().slice(0,10);
    const [oR,iR,cR,mR] = await Promise.all([
      sb.from('orders').select('*, order_items(*)').gte('scheduled_time',start.toISOString()).order('scheduled_time',{ascending:true}),
      sb.from('inventory').select('*').order('product_name').order('variant'),
      sb.from('capacity_usage').select('*').gte('order_date', todayStr),
      fetch(MENU_URL+'?v='+Date.now()).then(r=>r.json()).catch(()=>[])
    ]);
    allOrders=oR.data||[]; inventory=iR.data||[]; capacityData=cR.data||[]; menuItems=mR||[];
    document.getElementById('upd-time').innerText='Updated: '+now.toLocaleTimeString('en-IN');
    renderStats(); renderToday(); renderPending(); renderConfirmed();
    renderKitchen(); renderPackaging(); renderOFD(); renderFuture(); renderCompleted();
    renderInventory();
  }

  /* ── Helpers ── */
  const isToday    = dt=>{ const d=new Date(dt),n=new Date(); return d.toDateString()===n.toDateString(); };
  const isTomorrow = dt=>{ const d=new Date(dt),t=new Date(); t.setDate(t.getDate()+1); return d.toDateString()===t.toDateString(); };
  const isAfterTom = dt=>!isToday(dt)&&!isTomorrow(dt)&&new Date(dt)>new Date();
  const fmtTime    = dt=>new Date(dt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
  const fmtDate    = dt=>new Date(dt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',timeZone:'Asia/Kolkata'});
  const fmtDT      = dt=>new Date(dt).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});

  function cdHtml(dt) {
    const diff=new Date(dt)-new Date();
    if(diff<0) return `<span class="cd cd-late">OVERDUE</span>`;
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
    return `<span class="cd ${diff<3600000?'cd-urgent':'cd-ok'}">${h>0?h+'h ':''} ${m}m</span>`;
  }
  function sBadge(s){ const L={pending:'Pending',confirmed:'Confirmed',preparing:'Preparing',out_for_delivery:'Out for Delivery',delivered:'Delivered',cancelled:'Cancelled'}; return `<span class="badge b-${s}">${L[s]||s}</span>`; }

  const TRANS = { pending:['confirmed','cancelled'], confirmed:['preparing','cancelled'], preparing:['out_for_delivery','delivered'], out_for_delivery:['delivered'], delivered:[], cancelled:[] };
  const SLBL  = { confirmed:'✅ Confirm', preparing:'👨‍🍳 Preparing', out_for_delivery:'🚚 Out for Delivery', delivered:'✅ Delivered', cancelled:'❌ Cancel' };
  const SCLS  = { confirmed:'btn-confirmed', preparing:'btn-preparing', out_for_delivery:'btn-out_for_delivery', delivered:'btn-delivered', cancelled:'btn-cancelled' };

  /* ── Order card ── */
  function orderCard(o) {
    const items=o.order_items||[];
    const packTime=new Date(new Date(o.scheduled_time)-PACK_MINS*60000);
    const isDel=o.order_type==='delivery';
    const itemsHtml=items.map(i=>`<div class="il"><span>${i.product_name}${i.variant?' ('+i.variant+')':''}</span><span style="font-weight:700;">${i.qty_per_packet}${i.unit}×${i.packets}pkt=<b style="color:var(--accent)">₹${i.line_total}</b></span></div>`).join('');
    const btnHtml=(TRANS[o.status]||[]).map(ns=>`<button class="st-btn ${SCLS[ns]}" onclick="updateStatus('${o.id}','${ns}',this)">${SLBL[ns]}</button>`).join('');
    return `<div class="order-card" id="card-${o.id}">
      <div class="oc-head">
        <div><div class="oc-ref">${o.order_ref||o.id.slice(0,8).toUpperCase()}</div><div class="oc-meta">${fmtDT(o.scheduled_time)} ${cdHtml(o.scheduled_time)}</div></div>
        <div class="badges">${sBadge(o.status)}<span class="badge b-${o.order_type}">${isDel?'🚚 Delivery':'🏪 Pickup'}</span></div>
      </div>
      <div class="oc-grid">
        <div><div class="l">Customer</div><div class="v">${o.customer_name}</div></div>
        <div><div class="l">Phone</div><div class="v"><a href="tel:${o.customer_phone}" style="color:var(--accent);">${o.customer_phone}</a></div></div>
        ${isDel?`<div><div class="l">Address</div><div class="v">${o.customer_address}${o.pincode?' ('+o.pincode+')':''}</div></div>`:`<div><div class="l">Type</div><div class="v">Store Pickup</div></div>`}
        <div><div class="l">Total</div><div class="v" style="color:var(--accent);">₹${o.total_amount}</div></div>
        <div><div class="l">Pack by</div><div class="v" style="color:var(--warn);">${fmtTime(packTime)}</div></div>
        ${o.distance_km?`<div><div class="l">Distance</div><div class="v">${o.distance_km} km</div></div>`:''}
      </div>
      <div class="items-box">${itemsHtml||'<span style="color:#bbb">No items</span>'}</div>
      <div class="st-btns">${btnHtml||'<span style="font-size:0.78rem;color:#bbb;">No further actions</span>'}</div>
    </div>`;
  }

  /* ── Kitchen strip (Today tab) ── */
  function kitchenStrip(orders) {
    const now=new Date(), cutoff=new Date(now.getTime()+2*3600000);
    // Show all active orders today in kitchen strip (not just next 2hrs — show all pending today)
    const active=orders.filter(o=>['pending','confirmed','preparing'].includes(o.status)&&isToday(o.scheduled_time));
    if(!active.length) return `<div class="kitchen-strip"><div class="ks-header"><span>Kitchen — next 2 hrs</span></div><div style="color:#bbb;font-size:0.82rem;padding:4px 0;">Nothing in next 2 hours</div></div>`;
    const slots={};
    active.forEach(o=>{
      const pack=new Date(new Date(o.scheduled_time)-PACK_MINS*60000);
      pack.setMinutes(pack.getMinutes()<30?0:30,0,0);
      const k=pack.toISOString();
      if(!slots[k]) slots[k]={time:pack,items:{}};
      (o.order_items||[]).forEach(i=>{
        const key=`${i.product_name}${i.variant?'('+i.variant+')':''}`;
        if(!slots[k].items[key]) slots[k].items[key]={name:i.product_name,variant:i.variant,unit:i.unit,qty:0};
        slots[k].items[key].qty+=i.qty_per_packet*i.packets;
      });
    });
    const slotHtml=Object.keys(slots).sort().map(k=>{
      const s=slots[k],diff=s.time-now,urgent=diff<3600000&&diff>=0;
      const iHtml=Object.values(s.items).map(it=>`<div class="kslot-item">${it.name}${it.variant?' ('+it.variant+')':''} <span>${it.qty%1===0?it.qty:it.qty.toFixed(2)} ${it.unit}</span></div>`).join('');
      return `<div class="kslot ${urgent?'urgent':''}"><div class="kslot-time">${fmtTime(s.time)}</div>${iHtml}</div>`;
    }).join('');
    return `<div class="kitchen-strip"><div class="ks-header"><span>Kitchen — next 2 hrs (pack deadlines)</span><span style="font-weight:400;color:#bbb;">${active.length} order${active.length>1?'s':''}</span></div><div class="ks-slots">${slotHtml}</div></div>`;
  }

  /* ── Schedule helpers ── */
  function buildSlots(orders){
    const slots={};
    orders.forEach(o=>{
      const pack=new Date(new Date(o.scheduled_time)-PACK_MINS*60000);
      pack.setMinutes(pack.getMinutes()<30?0:30,0,0);
      const k=pack.toISOString();
      if(!slots[k]) slots[k]={time:pack,items:{},refs:[]};
      slots[k].refs.push(o.order_ref||o.id.slice(0,8));
      (o.order_items||[]).forEach(i=>{
        const key=`${i.product_name}||${i.variant||''}||${i.unit}`;
        if(!slots[k].items[key]) slots[k].items[key]={name:i.product_name,variant:i.variant,unit:i.unit,qty:0};
        slots[k].items[key].qty+=i.qty_per_packet*i.packets;
      });
    });
    return slots;
  }
  function slotBlockHtml(slots,keys){
    if(!keys.length)return'';
    const now=new Date();
    return keys.map(k=>{
      const s=slots[k],diff=s.time-now,urgent=diff<7200000&&diff>=0;
      const iH=Object.values(s.items).map(i=>`<div class="ing-row"><div><div class="ing-name">${i.name}${i.variant?' ('+i.variant+')':''}</div><div class="ing-for">Orders: ${s.refs.join(', ')}</div></div><div class="ing-qty">${i.qty%1===0?i.qty:i.qty.toFixed(2)} ${i.unit}</div></div>`).join('');
      return `<div class="time-block"><div class="tb-head ${urgent&&diff>=0?'urgent':''}"><div class="tb-time">${fmtTime(s.time)}</div><div class="tb-desc">All items needed by this time • ${s.refs.length} order${s.refs.length>1?'s':''}</div></div><div class="tb-body">${iH}</div></div>`;
    }).join('');
  }
  function renderKitchen(){
    const el=document.getElementById('section-kitchen');
    const active=allOrders.filter(o=>['pending','confirmed','preparing'].includes(o.status)&&(isToday(o.scheduled_time)||isTomorrow(o.scheduled_time)));
    if(!active.length){el.innerHTML=`<div class="empty"><i class="fas fa-utensils"></i><p>No kitchen work</p></div>`;return;}
    const slots=buildSlots(active),sorted=Object.keys(slots).sort();
    const todK=sorted.filter(k=>isToday(slots[k].time)),tomK=sorted.filter(k=>isTomorrow(slots[k].time));
    el.innerHTML=(todK.length?`<div class="sched-day"><div class="sched-day-title">Today</div>${slotBlockHtml(slots,todK)}</div>`:'')+( tomK.length?`<div class="sched-day"><div class="sched-day-title">Tomorrow</div>${slotBlockHtml(slots,tomK)}</div>`:'');
  }
  function renderPackaging(){
    const el=document.getElementById('section-packaging');
    const active=allOrders.filter(o=>['pending','confirmed','preparing'].includes(o.status)&&(isToday(o.scheduled_time)||isTomorrow(o.scheduled_time)));
    if(!active.length){el.innerHTML=`<div class="empty"><i class="fas fa-box"></i><p>No packaging</p></div>`;return;}
    const smap={};
    active.forEach(o=>{
      const pack=new Date(new Date(o.scheduled_time)-PACK_MINS*60000);
      pack.setMinutes(pack.getMinutes()<30?0:30,0,0);
      const k=pack.toISOString();
      if(!smap[k]) smap[k]={time:pack,orders:[]};
      smap[k].orders.push(o);
    });
    const sorted=Object.keys(smap).sort(),now=new Date();
    const todK=sorted.filter(k=>isToday(smap[k].time)),tomK=sorted.filter(k=>isTomorrow(smap[k].time));
    function packSlots(keys,lbl){
      if(!keys.length)return'';
      return `<div class="sched-day"><div class="sched-day-title">${lbl}</div>`+keys.map(k=>{
        const s=smap[k],diff=s.time-now,urgent=diff<7200000&&diff>=0;
        const oH=s.orders.map(o=>{
          const items=(o.order_items||[]).map(i=>`<div class="il"><span>${i.product_name}${i.variant?' ('+i.variant+')':''}</span><span style="font-weight:700;">${i.qty_per_packet}${i.unit}×${i.packets}</span></div>`).join('');
          return `<div style="background:#f9f9f9;border-radius:8px;padding:10px;margin-bottom:6px;"><div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.82rem;"><b>${o.order_ref||o.id.slice(0,8)}</b><span style="color:#888;">${o.order_type==='delivery'?'🚚 '+o.customer_address.split(',')[0]:'🏪 Pickup'} • ${fmtTime(o.scheduled_time)}</span></div><div class="items-box" style="margin:0;">${items}</div></div>`;
        }).join('');
        return `<div class="time-block"><div class="tb-head ${urgent?'urgent':''}"><div class="tb-time">${fmtTime(s.time)}</div><div class="tb-desc">Pack by this time — ${s.orders.length} order${s.orders.length>1?'s':''}</div></div><div class="tb-body">${oH}</div></div>`;
      }).join('')+'</div>';
    }
    el.innerHTML=packSlots(todK,'Today')+packSlots(tomK,'Tomorrow');
  }

  /* ── Update status ── */
  async function updateStatus(orderId,newStatus,btn){
    if(!VALID_ST.includes(newStatus)){alert('Invalid status: '+newStatus);return;}
    btn.disabled=true; const orig=btn.innerText; btn.innerText='...';
    const{data,error}=await sb.from('orders').update({status:newStatus}).eq('id',orderId).select('*, order_items(*)').single();
    if(error){alert('Update failed: '+error.message);btn.disabled=false;btn.innerText=orig;return;}
    fetch(EDGE_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPA_ANON}`},body:JSON.stringify({type:'UPDATE',record:data,old_record:{status:'pending'}})}).catch(()=>{});
    await loadAll();
  }

  /* ── Inventory ── */
  async function renderInventory(){
    const el=document.getElementById('section-inventory');

    // Auto-sync menu items into inventory
    if(menuItems.length){
      const entries=[];
      menuItems.forEach(p=>{
        const unit=p.isKg?'Kg':/khandvi|dhokla|khichu|kachori/i.test(p.name)?'Kg':'Pcs';
        const defCap=unit==='Kg'?5:500;
        if(p.options&&p.options.length>0){
          p.options.forEach(opt=>entries.push({product_name:p.name,variant:opt.label,unit,daily_capacity:defCap}));
        } else {
          entries.push({product_name:p.name,variant:'',unit,daily_capacity:defCap});
        }
      });
      for(const e of entries){
        const exists=inventory.find(i=>i.product_name===e.product_name&&i.variant===e.variant);
        if(!exists) await sb.from('inventory').insert({product_name:e.product_name,variant:e.variant,unit:e.unit,daily_capacity:e.daily_capacity,in_stock:true});
      }
      const{data}=await sb.from('inventory').select('*').order('product_name').order('variant');
      inventory=data||inventory;
    }

    if(!inventory.length){el.innerHTML='<div class="empty"><i class="fas fa-boxes"></i><p>No products found.</p></div>';return;}

    // Fetch today's available qty for all products
    const today=new Date().toISOString().slice(0,10);
    const availMap={};
    for(const item of inventory){
      try {
        const{data}=await sb.rpc('get_available_qty',{p_name:item.product_name,p_variant:item.variant||'',p_date:today});
        availMap[`${item.product_name}||${item.variant||''}`]=data??item.daily_capacity;
      } catch(e){ availMap[`${item.product_name}||${item.variant||''}`]=item.daily_capacity; }
    }

    // Group by product
    const grouped={};
    inventory.forEach(item=>{
      if(!grouped[item.product_name])grouped[item.product_name]=[];
      grouped[item.product_name].push(item);
    });

    const html=Object.entries(grouped).map(([pname,items])=>
      items.map(item=>{
        const key=`${item.product_name}||${item.variant||''}`;
        const avail=availMap[key]??item.daily_capacity;
        const isOut=avail<=0;
        const step=item.unit==='Kg'?'0.25':'1';
        return `<div class="inv-card ${isOut?'out':''}" id="inv-${item.id}">
          <div style="flex:1;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
              <div>
                <div class="inv-name">${item.product_name}</div>
                ${item.variant?`<div style="font-size:0.76rem;color:#aaa;">${item.variant}</div>`:''}
              </div>
              <span style="font-size:0.72rem;font-weight:800;padding:3px 10px;border-radius:20px;background:${isOut?'#fde8e8':'#eafaf1'};color:${isOut?'var(--danger)':'var(--success)'};">
                ${isOut?'Out of Stock':avail%1===0?avail:parseFloat(avail).toFixed(2)+' '+item.unit+' left'}
              </span>
            </div>
            <div style="font-size:0.78rem;color:#888;margin-bottom:10px;">
              Daily capacity: <b style="color:var(--dark);">${item.daily_capacity} ${item.unit}</b>
              &nbsp;|&nbsp; Available today: <b style="color:${isOut?'var(--danger)':'var(--success)'};">${isOut?'None':avail+' '+item.unit}</b>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-size:0.75rem;color:#aaa;white-space:nowrap;">Set daily capacity:</span>
              <input id="cap-${item.id}" type="number" min="0" step="${step}" value="${item.daily_capacity}"
                style="width:70px;padding:6px 8px;border:1px solid #ddd;border-radius:8px;font-family:inherit;font-size:0.85rem;font-weight:700;text-align:center;outline:none;">
              <span style="font-size:0.75rem;color:#aaa;">${item.unit}</span>
              <button onclick="saveCap(${item.id})"
                style="background:var(--info);color:white;border:none;padding:6px 14px;border-radius:8px;font-weight:700;font-size:0.76rem;cursor:pointer;font-family:inherit;">
                Save
              </button>
              <button onclick="toggleInStock(${item.id},${!isOut})"
                style="background:${isOut?'var(--success)':'#fde8e8'};color:${isOut?'white':'var(--danger)'};border:none;padding:6px 14px;border-radius:8px;font-weight:700;font-size:0.76rem;cursor:pointer;font-family:inherit;">
                ${isOut?'Mark In Stock':'Mark Out of Stock'}
              </button>
            </div>
          </div>
        </div>`;
      }).join('')
    ).join('');

    el.innerHTML=`<div class="sec-title">${inventory.length} products • availability = daily capacity - today's orders</div><div class="inv-grid">${html}</div>`;
  }

  async function saveCap(id){
    const val=parseFloat(document.getElementById(`cap-${id}`).value)||0;
    const{error}=await sb.from('inventory').update({daily_capacity:val,in_stock:val>0}).eq('id',id);
    if(error){alert('Save failed: '+error.message);return;}
    await loadAll();
  }

  async function toggleInStock(id, inStock){
    await sb.from('inventory').update({in_stock:inStock}).eq('id',id);
    await loadAll();
  }
