<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Owner Console | 25 Plus Snacks</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --accent:#d35400; --dark:#1e272e; --success:#27ae60; --warn:#f39c12; --info:#2980b9; --danger:#e74c3c; --border:#eee; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Plus Jakarta Sans',sans-serif; background:#f1f2f6; color:var(--dark); }

    /* PIN */
    #pin-screen { position:fixed; inset:0; background:var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    #pin-screen h1 { color:white; font-size:1.5rem; margin-bottom:6px; }
    #pin-screen p  { color:rgba(255,255,255,0.5); font-size:0.85rem; margin-bottom:24px; }
    #pin-input { background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); color:white; padding:14px 20px; border-radius:12px; font-size:1.5rem; letter-spacing:8px; text-align:center; width:200px; outline:none; font-family:inherit; }
    #pin-input:focus { border-color:var(--accent); }
    #pin-error { color:#e74c3c; font-size:0.8rem; margin-top:8px; height:16px; }
    .pin-btn { background:var(--accent); color:white; border:none; padding:14px 32px; border-radius:12px; font-weight:800; font-size:1rem; cursor:pointer; margin-top:12px; font-family:inherit; width:200px; }

    /* HEADER */
    header { background:var(--dark); padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:52px; position:sticky; top:0; z-index:100; }
    .logo { color:white; font-weight:800; font-size:0.95rem; }
    .logo span { color:var(--accent); }
    .hdr-right { display:flex; align-items:center; gap:12px; }
    .live-dot { width:8px; height:8px; background:#27ae60; border-radius:50%; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .logout-btn { color:rgba(255,255,255,0.5); font-size:0.78rem; cursor:pointer; border:none; background:none; font-family:inherit; }

    /* TABS */
    .tab-bar { background:white; border-bottom:2px solid var(--border); display:flex; overflow-x:auto; padding:0 12px; position:sticky; top:52px; z-index:99; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab { padding:12px 14px; font-weight:700; font-size:0.78rem; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; color:#999; transition:0.2s; display:flex; align-items:center; gap:5px; }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-count { background:#eee; color:#666; border-radius:20px; padding:1px 6px; font-size:0.68rem; font-weight:800; }
    .tab.active .tab-count { background:var(--accent); color:white; }

    /* MAIN */
    main { max-width:1100px; margin:0 auto; padding:16px 14px 60px; }

    /* STATS */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; margin-bottom:16px; }
    .stat-card { background:white; border-radius:14px; padding:14px; border-left:4px solid; }
    .stat-card .num { font-size:1.6rem; font-weight:900; }
    .stat-card .lbl { font-size:0.7rem; color:#888; font-weight:600; margin-top:2px; }
    .s-pending { border-color:var(--warn); }   .s-pending .num { color:var(--warn); }
    .s-confirmed{ border-color:var(--info); }  .s-confirmed .num { color:var(--info); }
    .s-ofd { border-color:#8e44ad; }           .s-ofd .num { color:#8e44ad; }
    .s-done { border-color:var(--success); }   .s-done .num { color:var(--success); }
    .s-future { border-color:#16a085; }        .s-future .num { color:#16a085; }

    /* SECTIONS */
    .section { display:none; }
    .section.active { display:block; }
    .sec-title { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; color:#bbb; margin:16px 0 8px; }

    /* MINI KITCHEN STRIP (overview) */
    .kitchen-strip { background:white; border-radius:14px; padding:14px 16px; margin-bottom:16px; border:1px solid var(--border); }
    .kitchen-strip-title { font-size:0.72rem; font-weight:800; text-transform:uppercase; color:#aaa; margin-bottom:10px; display:flex; justify-content:space-between; }
    .kitchen-slots { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; }
    .kitchen-slots::-webkit-scrollbar { display:none; }
    .kslot { background:#f9f9f9; border-radius:10px; padding:10px 14px; min-width:160px; border:1px solid var(--border); flex-shrink:0; }
    .kslot.urgent { background:#fff8f0; border-color:var(--warn); }
    .kslot-time { font-size:0.9rem; font-weight:900; color:var(--accent); margin-bottom:6px; }
    .kslot.urgent .kslot-time { color:var(--warn); }
    .kslot-item { font-size:0.78rem; color:var(--dark); padding:2px 0; display:flex; justify-content:space-between; gap:8px; }
    .kslot-item span { font-weight:800; color:var(--accent); }
    .no-kitchen { font-size:0.82rem; color:#bbb; padding:8px 0; }

    /* ORDER CARD */
    .order-card { background:white; border-radius:14px; padding:18px; margin-bottom:10px; border:1px solid var(--border); }
    .oc-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
    .oc-ref { font-size:1rem; font-weight:900; letter-spacing:1px; }
    .oc-meta { font-size:0.75rem; color:#aaa; margin-top:2px; }
    .badges { display:flex; gap:5px; flex-wrap:wrap; }
    .badge { font-size:0.68rem; font-weight:800; padding:3px 9px; border-radius:20px; }
    .b-pending         { background:#fff8e8; color:#b7770d; }
    .b-confirmed       { background:#e8f4fd; color:#1a6fa3; }
    .b-preparing       { background:#fff0e8; color:#c0392b; }
    .b-out_for_delivery{ background:#f0e8ff; color:#6c3483; }
    .b-delivered       { background:#eafaf1; color:#1e7e34; }
    .b-cancelled       { background:#fde8e8; color:#922b21; }
    .b-delivery        { background:#e8f4fd; color:#1a6fa3; }
    .b-pickup          { background:#eafaf1; color:#1e7e34; }

    .oc-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px 14px; font-size:0.8rem; margin-bottom:10px; }
    .oc-grid .l { color:#aaa; }
    .oc-grid .v { font-weight:600; }

    .items-box { background:#f9f9f9; border-radius:8px; padding:8px 12px; margin-bottom:10px; font-size:0.8rem; }
    .items-box .il { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #eee; }
    .items-box .il:last-child { border:none; }

    /* STATUS BUTTONS */
    .st-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .st-btn { border:none; padding:8px 14px; border-radius:8px; font-weight:700; font-size:0.76rem; cursor:pointer; font-family:inherit; transition:0.2s; display:flex; align-items:center; gap:4px; }
    .st-btn:hover { transform:translateY(-1px); opacity:0.9; }
    .st-btn:disabled { opacity:0.5; pointer-events:none; }
    .btn-confirmed        { background:#e8f4fd; color:#1a6fa3; }
    .btn-preparing        { background:#fff0e8; color:var(--accent); }
    .btn-out_for_delivery { background:#f0e8ff; color:#6c3483; }
    .btn-delivered        { background:#eafaf1; color:var(--success); }
    .btn-cancelled        { background:#fde8e8; color:var(--danger); }

    /* SCHEDULE */
    .sched-day { margin-bottom:24px; }
    .sched-day-title { font-weight:800; font-size:0.95rem; margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid var(--border); }
    .time-block { background:white; border-radius:12px; margin-bottom:8px; overflow:hidden; border:1px solid var(--border); }
    .tb-head { padding:10px 14px; background:#f9f9f9; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .tb-head.urgent { background:#fff8f0; }
    .tb-time { font-size:0.95rem; font-weight:900; color:var(--accent); min-width:65px; }
    .tb-head.urgent .tb-time { color:var(--warn); }
    .tb-desc { font-size:0.76rem; color:#888; font-weight:600; }
    .tb-body { padding:10px 14px; }
    .ing-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid #f5f5f5; font-size:0.82rem; }
    .ing-row:last-child { border:none; }
    .ing-name { font-weight:700; }
    .ing-qty  { font-weight:900; color:var(--accent); font-size:0.9rem; }
    .ing-for  { font-size:0.7rem; color:#bbb; }

    /* INVENTORY */
    .inv-toolbar { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
    .inv-toolbar input { padding:10px 14px; border:1px solid var(--border); border-radius:10px; font-family:inherit; font-size:0.85rem; flex:1; min-width:200px; outline:none; }
    .inv-toolbar input:focus { border-color:var(--accent); }
    .btn-add-product { background:var(--accent); color:white; border:none; padding:10px 16px; border-radius:10px; font-weight:700; font-size:0.82rem; cursor:pointer; font-family:inherit; white-space:nowrap; }
    .inv-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:10px; }
    .inv-card { background:white; border-radius:12px; padding:14px; display:flex; align-items:center; justify-content:space-between; border:1px solid var(--border); }
    .inv-card.out { border-color:#fde8e8; background:#fffafa; }
    .inv-name { font-weight:700; font-size:0.88rem; }
    .inv-qty  { font-size:0.75rem; color:#aaa; margin-top:2px; }
    .inv-right { display:flex; align-items:center; gap:8px; }
    .qty-input { width:70px; padding:5px 8px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.82rem; font-weight:700; text-align:center; outline:none; }
    .qty-input:focus { border-color:var(--accent); }
    .toggle { position:relative; width:38px; height:22px; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-s { position:absolute; inset:0; background:#ddd; border-radius:22px; cursor:pointer; transition:0.3s; }
    .toggle-s:before { content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:white; border-radius:50%; transition:0.3s; }
    .toggle input:checked + .toggle-s { background:var(--success); }
    .toggle input:checked + .toggle-s:before { transform:translateX(16px); }

    /* COUNTDOWN */
    .cd { font-size:0.7rem; font-weight:800; padding:2px 7px; border-radius:10px; margin-left:6px; }
    .cd-ok     { background:#eafaf1; color:var(--success); }
    .cd-urgent { background:#fff0e8; color:var(--accent); }
    .cd-late   { background:#fde8e8; color:var(--danger); }

    /* EMPTY */
    .empty { text-align:center; padding:40px; color:#ccc; }
    .empty i { font-size:2rem; margin-bottom:10px; display:block; }

    /* REFRESH */
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .refresh-btn { background:white; border:1px solid var(--border); color:var(--dark); padding:7px 14px; border-radius:8px; font-weight:700; font-size:0.76rem; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:5px; }
    .upd-time { font-size:0.72rem; color:#bbb; }

    @media(max-width:600px){
      .oc-grid { grid-template-columns:1fr; }
      .stats-row { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <h1>🔐 Owner Console</h1>
  <p>25 Plus Snacks — Admin Access</p>
  <input type="password" id="pin-input" placeholder="••••" maxlength="6" inputmode="numeric" onkeydown="if(event.key==='Enter')checkPin()">
  <div id="pin-error"></div>
  <button class="pin-btn" onclick="checkPin()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <header>
    <div class="logo"><span>25</span> Plus Snacks Console</div>
    <div class="hdr-right">
      <div class="live-dot"></div>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </header>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('today')"        id="tab-today">        <i class="fas fa-calendar-day"></i> Today         <span class="tab-count" id="cnt-today">0</span></div>
    <div class="tab"        onclick="switchTab('pending')"      id="tab-pending">      <i class="fas fa-clock"></i> Pending           <span class="tab-count" id="cnt-pending">0</span></div>
    <div class="tab"        onclick="switchTab('confirmed')"    id="tab-confirmed">    <i class="fas fa-check-circle"></i> Confirmed     <span class="tab-count" id="cnt-confirmed">0</span></div>
    <div class="tab"        onclick="switchTab('kitchen')"      id="tab-kitchen">      <i class="fas fa-utensils"></i> Kitchen</div>
    <div class="tab"        onclick="switchTab('packaging')"    id="tab-packaging">    <i class="fas fa-box"></i> Packaging</div>
    <div class="tab"        onclick="switchTab('ofd')"          id="tab-ofd">          <i class="fas fa-truck"></i> Out for Delivery  <span class="tab-count" id="cnt-ofd">0</span></div>
    <div class="tab"        onclick="switchTab('future')"       id="tab-future">       <i class="fas fa-calendar-alt"></i> Future Orders <span class="tab-count" id="cnt-future">0</span></div>
    <div class="tab"        onclick="switchTab('completed')"    id="tab-completed">    <i class="fas fa-check-double"></i> Completed     <span class="tab-count" id="cnt-done">0</span></div>
    <div class="tab"        onclick="switchTab('inventory')"    id="tab-inventory">    <i class="fas fa-boxes"></i> Inventory</div>
  </div>

  <main>
    <div class="top-bar">
      <div class="stats-row" id="stats-row" style="flex:1;margin-bottom:0;"></div>
      <button class="refresh-btn" onclick="loadAll()" style="margin-left:10px;"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
    <div class="upd-time" id="upd-time" style="margin-bottom:12px;"></div>

    <div class="section active" id="section-today"></div>
    <div class="section"        id="section-pending"></div>
    <div class="section"        id="section-confirmed"></div>
    <div class="section"        id="section-kitchen"></div>
    <div class="section"        id="section-packaging"></div>
    <div class="section"        id="section-ofd"></div>
    <div class="section"        id="section-future"></div>
    <div class="section"        id="section-completed"></div>
    <div class="section"        id="section-inventory"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  /* ── Config ─────────────────────────────── */
  const PIN          = '2526';   // ← change your PIN here
  const SUPA_URL     = 'https://qkemufgipqtqqsmzzjlb.supabase.co';
  const SUPA_ANON    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrZW11ZmdpcHF0cXFzbXp6amxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDkzNjYsImV4cCI6MjA4OTk4NTM2Nn0.fNclTYljlN2qze9_wMuzDPh68l0Ve15OkNY7Zl6aFPs';
  const EDGE_URL     = `${SUPA_URL}/functions/v1/send-order-email`;
  const MENU_URL     = 'https://raw.githubusercontent.com/25plussnacks/25Plus-assets/main/menu.json';
  const PACK_MINS    = 20;  // packaging + buffer before delivery

  const sb = supabase.createClient(SUPA_URL, SUPA_ANON);

  let allOrders = [], inventory = [], menuItems = [], activeTab = 'today';

  /* ── Valid status values (must match DB check constraint exactly) ── */
  const VALID_STATUSES = ['pending','confirmed','preparing','out_for_delivery','delivered','cancelled'];

  /* ── PIN ─────────────────────────────────── */
  function checkPin() {
    if (document.getElementById('pin-input').value.trim() === PIN) {
      sessionStorage.setItem('ca','1');
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadAll(); setInterval(loadAll, 60000);
    } else {
      document.getElementById('pin-error').innerText = 'Wrong PIN.';
      document.getElementById('pin-input').value = '';
    }
  }
  function logout() { sessionStorage.removeItem('ca'); location.reload(); }
  if (sessionStorage.getItem('ca') === '1') {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll(); setInterval(loadAll, 60000);
  }

  /* ── Tabs ────────────────────────────────── */
  function switchTab(t) {
    activeTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${t}`).classList.add('active');
    document.getElementById(`section-${t}`).classList.add('active');
  }

  /* ── Load ────────────────────────────────── */
  async function loadAll() {
    const now   = new Date();
    const start = new Date(now); start.setDate(start.getDate() - 1); start.setHours(0,0,0,0);

    const [oRes, iRes, mRes] = await Promise.all([
      sb.from('orders').select('*, order_items(*)').gte('scheduled_time', start.toISOString()).order('scheduled_time', { ascending: true }),
      sb.from('inventory').select('*').order('product_name'),
      fetch(MENU_URL + '?v=' + Date.now()).then(r => r.json()).catch(() => [])
    ]);

    allOrders = oRes.data  || [];
    inventory = iRes.data  || [];
    menuItems = mRes       || [];

    document.getElementById('upd-time').innerText = 'Updated: ' + now.toLocaleTimeString('en-IN');

    renderStats();
    renderToday();
    renderPending();
    renderConfirmed();
    renderKitchen();
    renderPackaging();
    renderOFD();
    renderFuture();
    renderCompleted();
    renderInventory();
  }

  /* ── Helpers ─────────────────────────────── */
  const isToday    = dt => { const d = new Date(dt), n = new Date(); return d.toDateString() === n.toDateString(); };
  const isTomorrow = dt => { const d = new Date(dt), t = new Date(); t.setDate(t.getDate()+1); return d.toDateString() === t.toDateString(); };
  const isAfterTomorrow = dt => !isToday(dt) && !isTomorrow(dt) && new Date(dt) > new Date();
  const fmtTime = dt => new Date(dt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
  const fmtDate = dt => new Date(dt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',timeZone:'Asia/Kolkata'});
  const fmtDT   = dt => new Date(dt).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});

  function cdHtml(dt) {
    const diff = new Date(dt) - new Date();
    if (diff < 0) return `<span class="cd cd-late">OVERDUE</span>`;
    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
    const txt = h > 0 ? `${h}h ${m}m` : `${m}m`;
    return `<span class="cd ${diff < 3600000 ? 'cd-urgent':'cd-ok'}">${txt}</span>`;
  }

  function statusBadge(s) {
    const L = {pending:'Pending',confirmed:'Confirmed',preparing:'Preparing',out_for_delivery:'Out for Delivery',delivered:'Delivered',cancelled:'Cancelled'};
    return `<span class="badge b-${s}">${L[s]||s}</span>`;
  }

  /* ── Status transition map ───────────────────
     Keys and values MUST match DB check constraint exactly:
     pending | confirmed | preparing | out_for_delivery | delivered | cancelled
  ──────────────────────────────────────────── */
  const TRANSITIONS = {
    pending:          ['confirmed','cancelled'],
    confirmed:        ['preparing','cancelled'],
    preparing:        ['out_for_delivery','delivered'],
    out_for_delivery: ['delivered'],
    delivered:        [],
    cancelled:        []
  };

  const STATUS_LABELS = {
    confirmed:        '✅ Confirm',
    preparing:        '👨‍🍳 Preparing',
    out_for_delivery: '🚚 Out for Delivery',
    delivered:        '✅ Delivered',
    cancelled:        '❌ Cancel'
  };

  const STATUS_BTN_CLASS = {
    confirmed:        'btn-confirmed',
    preparing:        'btn-preparing',
    out_for_delivery: 'btn-out_for_delivery',
    delivered:        'btn-delivered',
    cancelled:        'btn-cancelled'
  };

  /* ── Order card ──────────────────────────── */
  function orderCard(o) {
    const items = o.order_items || [];
    const packTime = new Date(new Date(o.scheduled_time) - PACK_MINS * 60000);
    const isDelivery = o.order_type === 'delivery';

    const itemsHtml = items.map(i =>
      `<div class="il">
        <span>${i.product_name}${i.variant?' ('+i.variant+')':''}</span>
        <span style="font-weight:700;">${i.qty_per_packet}${i.unit} × ${i.packets}pkt = <b style="color:var(--accent)">₹${i.line_total}</b></span>
      </div>`).join('');

    const transitions = TRANSITIONS[o.status] || [];
    const btnHtml = transitions.map(ns =>
      `<button class="st-btn ${STATUS_BTN_CLASS[ns]}" onclick="updateStatus('${o.id}','${ns}',this)">
        ${STATUS_LABELS[ns]}
      </button>`
    ).join('');

    return `<div class="order-card" id="card-${o.id}">
      <div class="oc-head">
        <div>
          <div class="oc-ref">${o.order_ref || o.id.slice(0,8).toUpperCase()}</div>
          <div class="oc-meta">${fmtDT(o.scheduled_time)} ${cdHtml(o.scheduled_time)}</div>
        </div>
        <div class="badges">
          ${statusBadge(o.status)}
          <span class="badge b-${o.order_type}">${isDelivery?'🚚 Delivery':'🏪 Pickup'}</span>
        </div>
      </div>
      <div class="oc-grid">
        <div><div class="l">Customer</div><div class="v">${o.customer_name}</div></div>
        <div><div class="l">Phone</div><div class="v"><a href="tel:${o.customer_phone}" style="color:var(--accent);">${o.customer_phone}</a></div></div>
        ${isDelivery
          ? `<div><div class="l">Address</div><div class="v">${o.customer_address}${o.pincode?' ('+o.pincode+')':''}</div></div>`
          : `<div><div class="l">Type</div><div class="v">Store Pickup</div></div>`}
        <div><div class="l">Total</div><div class="v" style="color:var(--accent);font-size:0.95rem;">₹${o.total_amount}</div></div>
        <div><div class="l">Pack by</div><div class="v" style="color:var(--warn);">${fmtTime(packTime)}</div></div>
        ${o.distance_km ? `<div><div class="l">Distance</div><div class="v">${o.distance_km} km</div></div>` : ''}
      </div>
      <div class="items-box">${itemsHtml || '<span style="color:#bbb">No items</span>'}</div>
      <div class="st-btns">${btnHtml || '<span style="font-size:0.78rem;color:#bbb;">No further actions</span>'}</div>
    </div>`;
  }

  /* ── Mini kitchen strip for Today tab ───── */
  function kitchenStrip(orders) {
    const now = new Date();
    const cutoff = new Date(now.getTime() + 2 * 3600000); // next 2 hours
    const active = orders.filter(o =>
      ['pending','confirmed','preparing'].includes(o.status) &&
      new Date(o.scheduled_time) <= cutoff &&
      new Date(o.scheduled_time) >= now
    );
    if (!active.length) return `<div class="kitchen-strip"><div class="kitchen-strip-title"><span>Kitchen — next 2 hrs</span></div><div class="no-kitchen">Nothing in next 2 hours</div></div>`;

    // Group by 30-min slot
    const slots = {};
    active.forEach(o => {
      const pack = new Date(new Date(o.scheduled_time) - PACK_MINS * 60000);
      const m = pack.getMinutes() < 30 ? 0 : 30;
      pack.setMinutes(m, 0, 0);
      const k = pack.toISOString();
      if (!slots[k]) slots[k] = { time: pack, items: {} };
      (o.order_items || []).forEach(i => {
        const key = `${i.product_name}${i.variant?'('+i.variant+')':''}`;
        if (!slots[k].items[key]) slots[k].items[key] = { name: i.product_name, variant: i.variant, unit: i.unit, qty: 0 };
        slots[k].items[key].qty += i.qty_per_packet * i.packets;
      });
    });

    const slotHtml = Object.keys(slots).sort().map(k => {
      const s = slots[k];
      const diff = s.time - now;
      const urgent = diff < 3600000 && diff >= 0;
      const itemsHtml = Object.values(s.items).map(it =>
        `<div class="kslot-item">${it.name}${it.variant?' ('+it.variant+')':''} <span>${it.qty%1===0?it.qty:it.qty.toFixed(2)} ${it.unit}</span></div>`
      ).join('');
      return `<div class="kslot ${urgent?'urgent':''}"><div class="kslot-time">${fmtTime(s.time)}</div>${itemsHtml}</div>`;
    }).join('');

    return `<div class="kitchen-strip">
      <div class="kitchen-strip-title"><span>Kitchen — next 2 hrs (pack deadlines)</span><span style="font-weight:400;color:#bbb;">${active.length} order${active.length>1?'s':''}</span></div>
      <div class="kitchen-slots">${slotHtml}</div>
    </div>`;
  }

  /* ── Render sections ─────────────────────── */
  function renderStats() {
    const n = allOrders;
    const pending   = n.filter(o => o.status==='pending').length;
    const confirmed = n.filter(o => ['confirmed','preparing'].includes(o.status)).length;
    const ofd       = n.filter(o => o.status==='out_for_delivery').length;
    const done      = n.filter(o => o.status==='delivered' && isToday(o.scheduled_time)).length;
    const future    = n.filter(o => isAfterTomorrow(o.scheduled_time) && !['delivered','cancelled'].includes(o.status)).length;

    document.getElementById('cnt-today').innerText    = n.filter(o => isToday(o.scheduled_time) && !['delivered','cancelled'].includes(o.status)).length;
    document.getElementById('cnt-pending').innerText  = pending;
    document.getElementById('cnt-confirmed').innerText= confirmed;
    document.getElementById('cnt-ofd').innerText      = ofd;
    document.getElementById('cnt-future').innerText   = future;
    document.getElementById('cnt-done').innerText     = n.filter(o => ['delivered','cancelled'].includes(o.status) && isToday(o.scheduled_time)).length;

    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card s-pending"><div class="num">${pending}</div><div class="lbl">Pending</div></div>
      <div class="stat-card s-confirmed"><div class="num">${confirmed}</div><div class="lbl">Confirmed</div></div>
      <div class="stat-card s-ofd"><div class="num">${ofd}</div><div class="lbl">Out for Delivery</div></div>
      <div class="stat-card s-future"><div class="num">${future}</div><div class="lbl">Future Orders</div></div>
      <div class="stat-card s-done"><div class="num">${done}</div><div class="lbl">Done Today</div></div>`;
  }

  /* FIX 4: Today only shows PENDING orders (not delivered/cancelled) sorted by delivery time */
  function renderToday() {
    const el = document.getElementById('section-today');
    const todayActive = allOrders.filter(o =>
      isToday(o.scheduled_time) &&
      !['delivered','cancelled'].includes(o.status)
    );
    const todayAll = allOrders.filter(o => isToday(o.scheduled_time));
    el.innerHTML = kitchenStrip(todayAll) +
      (todayActive.length
        ? `<div class="sec-title">Today's pending orders — sorted by delivery time</div>` + todayActive.map(orderCard).join('')
        : `<div class="empty"><i class="fas fa-check-circle"></i><p>All done for today!</p></div>`);
  }

  function renderPending() {
    const el = document.getElementById('section-pending');
    const orders = allOrders.filter(o => o.status === 'pending');
    el.innerHTML = orders.length ? orders.map(orderCard).join('') : `<div class="empty"><i class="fas fa-inbox"></i><p>No pending orders</p></div>`;
  }

  function renderConfirmed() {
    const el = document.getElementById('section-confirmed');
    const orders = allOrders.filter(o => ['confirmed','preparing'].includes(o.status));
    el.innerHTML = orders.length ? orders.map(orderCard).join('') : `<div class="empty"><i class="fas fa-inbox"></i><p>No confirmed orders</p></div>`;
  }

  function renderOFD() {
    const el = document.getElementById('section-ofd');
    const orders = allOrders.filter(o => o.status === 'out_for_delivery');
    el.innerHTML = orders.length ? orders.map(orderCard).join('') : `<div class="empty"><i class="fas fa-truck"></i><p>No orders out for delivery</p></div>`;
  }

  /* FIX 4: Completed shows delivered + cancelled (not overdue) */
  function renderCompleted() {
    const el = document.getElementById('section-completed');
    const orders = allOrders.filter(o => ['delivered','cancelled'].includes(o.status));
    if (!orders.length) { el.innerHTML = `<div class="empty"><i class="fas fa-check-double"></i><p>No completed orders</p></div>`; return; }
    const today = orders.filter(o => isToday(o.scheduled_time));
    const older = orders.filter(o => !isToday(o.scheduled_time));
    el.innerHTML =
      (today.length ? `<div class="sec-title">Today</div>` + today.map(orderCard).join('') : '') +
      (older.length ? `<div class="sec-title">Earlier</div>` + older.map(orderCard).join('') : '');
  }

  /* FIX 5: Future orders tab */
  function renderFuture() {
    const el = document.getElementById('section-future');
    const orders = allOrders.filter(o =>
      !isToday(o.scheduled_time) &&
      new Date(o.scheduled_time) > new Date() &&
      !['delivered','cancelled'].includes(o.status)
    );
    if (!orders.length) { el.innerHTML = `<div class="empty"><i class="fas fa-calendar-alt"></i><p>No future orders</p></div>`; return; }

    const tom    = orders.filter(o => isTomorrow(o.scheduled_time));
    const later  = orders.filter(o => isAfterTomorrow(o.scheduled_time));

    el.innerHTML =
      (tom.length   ? `<div class="sec-title">Tomorrow</div>`  + tom.map(orderCard).join('')  : '') +
      (later.length ? `<div class="sec-title">After Tomorrow</div>` + later.map(orderCard).join('') : '');
  }

  /* ── Kitchen schedule ────────────────────── */
  function buildSlots(orders) {
    const slots = {};
    orders.forEach(o => {
      const pack = new Date(new Date(o.scheduled_time) - PACK_MINS * 60000);
      const m = pack.getMinutes() < 30 ? 0 : 30;
      pack.setMinutes(m, 0, 0);
      const k = pack.toISOString();
      if (!slots[k]) slots[k] = { time: pack, items: {}, orderRefs: [] };
      slots[k].orderRefs.push(o.order_ref || o.id.slice(0,8));
      (o.order_items || []).forEach(i => {
        const key = `${i.product_name}||${i.variant||''}||${i.unit}`;
        if (!slots[k].items[key]) slots[k].items[key] = { name: i.product_name, variant: i.variant, unit: i.unit, qty: 0 };
        slots[k].items[key].qty += i.qty_per_packet * i.packets;
      });
    });
    return slots;
  }

  function renderSlotBlock(slots, keys) {
    if (!keys.length) return '';
    const now = new Date();
    return keys.map(k => {
      const s = slots[k];
      const diff = s.time - now;
      const urgent = diff < 7200000 && diff >= 0;
      const past   = diff < 0;
      const itemsHtml = Object.values(s.items).map(i =>
        `<div class="ing-row">
          <div><div class="ing-name">${i.name}${i.variant?' ('+i.variant+')':''}</div><div class="ing-for">Orders: ${s.orderRefs.join(', ')}</div></div>
          <div class="ing-qty">${i.qty%1===0?i.qty:i.qty.toFixed(2)} ${i.unit}</div>
        </div>`
      ).join('');
      return `<div class="time-block">
        <div class="tb-head ${urgent&&!past?'urgent':''}">
          <div class="tb-time">${fmtTime(s.time)}</div>
          <div class="tb-desc">All items ready by this time • ${s.orderRefs.length} order${s.orderRefs.length>1?'s':''} ${past?'<span style="color:#e74c3c;font-weight:800;">PAST</span>':''}</div>
        </div>
        <div class="tb-body">${itemsHtml}</div>
      </div>`;
    }).join('');
  }

  function renderKitchen() {
    const el = document.getElementById('section-kitchen');
    const active = allOrders.filter(o =>
      ['pending','confirmed','preparing'].includes(o.status) &&
      (isToday(o.scheduled_time) || isTomorrow(o.scheduled_time))
    );
    if (!active.length) { el.innerHTML = `<div class="empty"><i class="fas fa-utensils"></i><p>No kitchen work scheduled</p></div>`; return; }

    const slots   = buildSlots(active);
    const sorted  = Object.keys(slots).sort();
    const todayK  = sorted.filter(k => isToday(slots[k].time));
    const tomK    = sorted.filter(k => isTomorrow(slots[k].time));

    el.innerHTML =
      (todayK.length ? `<div class="sched-day"><div class="sched-day-title">Today</div>${renderSlotBlock(slots, todayK)}</div>` : '') +
      (tomK.length   ? `<div class="sched-day"><div class="sched-day-title">Tomorrow</div>${renderSlotBlock(slots, tomK)}</div>` : '');
  }

  function renderPackaging() {
    const el = document.getElementById('section-packaging');
    const active = allOrders.filter(o =>
      ['pending','confirmed','preparing'].includes(o.status) &&
      (isToday(o.scheduled_time) || isTomorrow(o.scheduled_time))
    );
    if (!active.length) { el.innerHTML = `<div class="empty"><i class="fas fa-box"></i><p>No packaging scheduled</p></div>`; return; }

    const slotsMap = {};
    active.forEach(o => {
      const pack = new Date(new Date(o.scheduled_time) - PACK_MINS * 60000);
      const m = pack.getMinutes() < 30 ? 0 : 30;
      pack.setMinutes(m, 0, 0);
      const k = pack.toISOString();
      if (!slotsMap[k]) slotsMap[k] = { time: pack, orders: [] };
      slotsMap[k].orders.push(o);
    });

    const sorted = Object.keys(slotsMap).sort();
    const todayK = sorted.filter(k => isToday(slotsMap[k].time));
    const tomK   = sorted.filter(k => isTomorrow(slotsMap[k].time));
    const now = new Date();

    function renderPackSlots(keys, label) {
      if (!keys.length) return '';
      return `<div class="sched-day"><div class="sched-day-title">${label}</div>` +
        keys.map(k => {
          const s = slotsMap[k];
          const diff = s.time - now;
          const urgent = diff < 7200000 && diff >= 0;
          const ordersHtml = s.orders.map(o => {
            const items = (o.order_items||[]).map(i =>
              `<div class="il"><span>${i.product_name}${i.variant?' ('+i.variant+')':''}</span><span style="font-weight:700;">${i.qty_per_packet}${i.unit}×${i.packets}</span></div>`
            ).join('');
            return `<div style="background:#f9f9f9;border-radius:8px;padding:10px;margin-bottom:6px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.82rem;">
                <b>${o.order_ref||o.id.slice(0,8)}</b>
                <span style="color:#888;">${o.order_type==='delivery'?'🚚 '+o.customer_address.split(',')[0]:'🏪 Pickup'} • ${fmtTime(o.scheduled_time)}</span>
              </div>
              <div class="items-box" style="margin:0;">${items}</div>
            </div>`;
          }).join('');
          return `<div class="time-block">
            <div class="tb-head ${urgent?'urgent':''}"><div class="tb-time">${fmtTime(s.time)}</div><div class="tb-desc">Pack by this time — ${s.orders.length} order${s.orders.length>1?'s':''}</div></div>
            <div class="tb-body">${ordersHtml}</div>
          </div>`;
        }).join('') + '</div>';
    }

    el.innerHTML = renderPackSlots(todayK, 'Today') + renderPackSlots(tomK, 'Tomorrow');
  }

  /* ── Update status ───────────────────────── */
  async function updateStatus(orderId, newStatus, btn) {
    // Safety check — must be a valid DB value
    if (!VALID_STATUSES.includes(newStatus)) {
      alert('Invalid status: ' + newStatus); return;
    }
    btn.disabled = true;
    const original = btn.innerText;
    btn.innerText = '...';

    const { data, error } = await sb
      .from('orders')
      .update({ status: newStatus })
      .eq('id', orderId)
      .select('*, order_items(*)')
      .single();

    if (error) {
      alert('Update failed: ' + error.message);
      btn.disabled = false; btn.innerText = original; return;
    }

    // Fire status update email to customer
    fetch(EDGE_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${SUPA_ANON}` },
      body: JSON.stringify({
        type: 'UPDATE',
        record: data,
        old_record: { status: newStatus === 'confirmed' ? 'pending' : 'confirmed' }
      })
    }).catch(() => {});

    await loadAll();
  }

  /* ── Inventory ───────────────────────────────────── */
  async function renderInventory() {
    const el = document.getElementById('section-inventory');

    // Build flat list of all inventory entries from menu.json
    // Each variant becomes a separate entry: { product_name, variant, unit }
    if (menuItems.length) {
      const toSync = [];
      menuItems.forEach(p => {
        const unit = p.isKg ? 'Kg' : /khandvi|dhokla|khichu|kachori/i.test(p.name) ? 'Kg' : 'Pcs';
        if (p.options && p.options.length > 0) {
          // Variant product — one entry per variant
          p.options.forEach(opt => {
            toSync.push({ product_name: p.name, variant: opt.label, unit });
          });
        } else {
          // Simple product — one entry with empty variant
          toSync.push({ product_name: p.name, variant: '', unit });
        }
      });

      // Upsert missing entries
      for (const entry of toSync) {
        const exists = inventory.find(i => i.product_name === entry.product_name && i.variant === entry.variant);
        if (!exists) {
          await sb.from('inventory').insert({ ...entry, in_stock: true, stock_qty: 0 });
        }
      }

      // Reload
      const { data } = await sb.from('inventory').select('*').order('product_name').order('variant');
      inventory = data || inventory;
    }

    if (!inventory.length) {
      el.innerHTML = `<div class="empty"><i class="fas fa-boxes"></i><p>No products found.</p></div>`; return;
    }

    // Group by product_name for display
    const grouped = {};
    inventory.forEach(item => {
      if (!grouped[item.product_name]) grouped[item.product_name] = [];
      grouped[item.product_name].push(item);
    });

    const cardsHtml = Object.entries(grouped).map(([product, items]) => {
      return items.map(item => `
        <div class="inv-card ${item.in_stock?'':'out'}" id="inv-${item.id}">
          <div>
            <div class="inv-name">${item.product_name}${item.variant ? ' <span style="color:#aaa;font-weight:400;font-size:0.78rem;">('+item.variant+')</span>' : ''}</div>
            <div class="inv-qty">
              Stock:
              <input class="qty-input" type="number" min="0" step="${item.unit==='Kg'?'0.25':'1'}"
                value="${item.stock_qty||0}"
                onchange="updateQty(${item.id}, this.value)"
                style="width:65px;display:inline-block;">
              ${item.unit}
            </div>
          </div>
          <div class="inv-right">
            <span style="font-size:0.7rem;font-weight:800;color:${item.in_stock?'var(--success)':'var(--danger)'};" id="ilbl-${item.id}">
              ${item.in_stock?'In Stock':'Out'}
            </span>
            <label class="toggle">
              <input type="checkbox" ${item.in_stock?'checked':''} onchange="toggleStock(${item.id},this.checked)">
              <span class="toggle-s"></span>
            </label>
          </div>
        </div>`).join('');
    }).join('');

    el.innerHTML = `
      <div class="sec-title">${inventory.length} inventory entries — auto-synced from menu.json</div>
      <div class="inv-grid">${cardsHtml}</div>`;
  }

  async function toggleStock(id, inStock) {
    document.getElementById(`ilbl-${id}`).innerText     = inStock ? 'In Stock' : 'Out';
    document.getElementById(`ilbl-${id}`).style.color   = inStock ? 'var(--success)' : 'var(--danger)';
    document.getElementById(`inv-${id}`).classList.toggle('out', !inStock);
    await sb.from('inventory').update({ in_stock: inStock }).eq('id', id);
  }

  async function updateQty(id, qty) {
    const q = parseFloat(qty) || 0;
    await sb.from('inventory').update({ stock_qty: q, in_stock: q > 0 }).eq('id', id);
    const lbl = document.getElementById(`ilbl-${id}`);
    if (lbl) {
      lbl.innerText    = q > 0 ? 'In Stock' : 'Out';
      lbl.style.color  = q > 0 ? 'var(--success)' : 'var(--danger)';
      document.getElementById(`inv-${id}`).classList.toggle('out', q <= 0);
    }
  }
</script>
